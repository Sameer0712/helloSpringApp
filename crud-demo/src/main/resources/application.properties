spring.application.name=crud-demo
server.port=${PORT:8080}

# --- MySQL connection ---
# Locally these fall back to your MySQL Workbench defaults.
# In production (Render, etc.), set DB_URL / DB_USERNAME / DB_PASSWORD as
# environment variables and they'll override these defaults automatically.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskdb?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# ddl-auto=update lets Hibernate auto-create/update the "tasks" table from the Task entity.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
